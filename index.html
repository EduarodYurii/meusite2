<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Completo</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body { font-family: Arial; background:#f4f6f9; text-align:center; }
.login, .app { display:none; }
.container { display:flex; flex-wrap:wrap; justify-content:center; }
.card { width:130px; margin:10px; padding:10px; border-radius:15px; background:white; }
.card img { width:80px; height:80px; border-radius:50%; }
button{margin:5px;padding:6px;border:none;border-radius:6px;background:#007bff;color:white;cursor:pointer;font-size:12px;}
.formulario { margin:20px; }
input, select { padding:8px; margin:5px; border-radius:6px; border:1px solid #ccc; }
.status-btns { display:flex; flex-wrap:wrap; justify-content:center; }
.status-btns button { background:#6c757d; }
.status-btns button.ativo { background:#28a745; }
.topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;}
.btn-logout{background:#28a745; margin:0;}
</style>
</head>
<body>

<div class="login" id="login">
<h2>Login</h2>
<input type="text" id="user" placeholder="Usuário"><br><br>
<input type="password" id="pass" placeholder="Senha"><br><br>
<button onclick="entrar()">Entrar</button>
</div>

<div class="app" id="app">
<div class="topbar">
  <div>
    <h1 style="margin:0">Controle de Presença</h1>
    <div id="usuarioInfo" style="font-weight:bold"></div>
  </div>
  <button onclick="trocarUsuario()" class="btn-logout">Trocar Usuário</button>
</div>

<input type="date" id="dataSelecionada" onchange="trocarData()">

<div id="resumo" style="display:flex;justify-content:center;gap:15px;margin:10px;flex-wrap:wrap"></div>
<div id="alerta" style="margin:10px;font-weight:bold"></div>

<div class="formulario">
<input type="text" id="nomeInput" placeholder="Nome do colaborador">
<select id="turnoInput">
<option value="">Selecione o turno</option>
<option value="Manhã">Manhã</option>
<option value="Tarde">Tarde</option>
<option value="Noite">Noite</option>
</select>
<input type="file" id="fotoInput" accept="image/*">
<button onclick="salvarColaborador()">Salvar</button>
</div>

<button onclick="exportarExcel()">Exportar Excel do Mês</button>
<div class="container" id="painel"></div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('colabs')||'[]');
let registros = JSON.parse(localStorage.getItem('registros')||'{}');
let dataAtual = new Date().toISOString().split('T')[0];
let fotoBase64 = '';
let usuarioLogado = null;
let usuarioNome = '';

const usuarios = {
  bruna: { senha:'123', turno:'Manhã' },
  marciele: { senha:'123', turno:'Tarde' },
  pollyanna: { senha:'123', turno:'Noite' },
  yuri: { senha:'123', turno:'todos' },
  edimir: { senha:'123', turno:'todos' }
};

document.getElementById('dataSelecionada').value = dataAtual;

const STATUS = ["FERIAS","BH","P","HE","FOLGA","DSR","AT","F"];

function entrar(){
 let u = user.value.toLowerCase();
 let p = pass.value;

 if(usuarios[u] && usuarios[u].senha === p){
  usuarioLogado = usuarios[u];
  usuarioNome = u;
  login.style.display='none';
  app.style.display='block';
  document.getElementById('usuarioInfo').innerText = 'Usuário: ' + u.toUpperCase();
  controlarPermissaoCadastro();
  render();
 } else alert('Login inválido');
}

function salvar(){ 
 localStorage.setItem('colabs', JSON.stringify(db));
 localStorage.setItem('registros', JSON.stringify(registros));
}

function trocarData(){
 dataAtual = dataSelecionada.value;
 render();
}

function getStatus(i){
 return registros[dataAtual]?.[i] || '';
}

function setStatus(i, status){
 if(!registros[dataAtual]) registros[dataAtual] = {};

 if(registros[dataAtual][i] === status){
   registros[dataAtual][i] = '';
 } else {
   registros[dataAtual][i] = status;
 }
 salvar(); render();
}

function limparStatus(i){
 if(registros[dataAtual]) registros[dataAtual][i] = '';
 salvar(); render();
}

function podeCadastrar(){
 return usuarioNome === 'yuri' || usuarioNome === 'edimir';
}

function controlarPermissaoCadastro(){
 let form = document.querySelector('.formulario');
 form.style.display = podeCadastrar() ? 'block' : 'none';
}

function podeVer(turno){
 if(!usuarioLogado) return false;
 if(usuarioLogado.turno === 'todos') return true;
 return usuarioLogado.turno === turno;
}

function calcularResumo(){
 let total=0, presentes=0, faltas=0, folgas=0, outros=0;

 db.forEach((c,i)=>{
  if(!podeVer(c.turno)) return;
  total++;
  let s = getStatus(i);

  if(s === 'P') presentes++;
  else if(s === 'F') faltas++;
  else if(s === 'FOLGA') folgas++;
  else if(s) outros++;
 });

 let percentualFalta = total ? ((faltas/total)*100).toFixed(1) : 0;

 document.getElementById('resumo').innerHTML = `
  <div style="background:#fff;padding:10px;border-radius:10px">Total: ${total}</div>
  <div style="background:#d4edda;padding:10px;border-radius:10px">Presentes: ${presentes}</div>
  <div style="background:#f8d7da;padding:10px;border-radius:10px">Faltas: ${faltas}</div>
  <div style="background:#fff3cd;padding:10px;border-radius:10px">Folgas: ${folgas}</div>
  <div style="background:#e2e3e5;padding:10px;border-radius:10px">Outros: ${outros}</div>
  <div style="background:#cfe2ff;padding:10px;border-radius:10px">Absenteísmo: ${percentualFalta}%</div>
 `;

 let alerta = document.getElementById('alerta');
 if(percentualFalta > 20){
   alerta.innerText = '🔴 Alerta: Alto índice de absenteísmo!';
   alerta.style.color = 'red';
 } else {
   alerta.innerText = '';
 }
}

function render(){
 painel.innerHTML='';
 db.forEach((c,i)=>{
  if(!podeVer(c.turno)) return;

  let statusAtual = getStatus(i);

  let botoes = STATUS.map(s => {
    let ativo = s === statusAtual ? 'ativo' : '';
    return `<button class="${ativo}" onclick="event.stopPropagation();setStatus(${i},'${s}')">${s}</button>`;
  }).join('');

  let div = document.createElement('div');
  div.className='card';
  div.innerHTML=`
    <img src="${c.foto}"><br>
    ${c.nome}<br>
    <small>${c.turno}</small><br>
    <strong>${statusAtual || '-'}</strong>
    <div class="status-btns">${botoes}</div>
    <button onclick="event.stopPropagation();limparStatus(${i})" style="background:#dc3545">Limpar</button>
  `;

  painel.appendChild(div);
 });

 calcularResumo();
}

fotoInput.addEventListener('change', function(e){
 let reader = new FileReader();
 reader.onload = function(){ fotoBase64 = reader.result; };
 if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
});

function salvarColaborador(){
 let nome = nomeInput.value;
 let turno = turnoInput.value;

 if(!nome || !turno){
  alert('Preencha nome e turno');
  return;
 }

 db.push({ nome, turno, foto: fotoBase64 || 'https://via.placeholder.com/80' });
 salvar(); render();

 nomeInput.value=''; turnoInput.value=''; fotoInput.value=''; fotoBase64='';
}

function exportarExcel(){
 let mes = dataAtual.slice(0,7);
 let dias = Object.keys(registros)
   .filter(d => d.startsWith(mes))
   .sort();

 let dados = [];

 db.forEach((c,i)=>{
   if(!podeVer(c.turno)) return;

   let linha = { Nome: c.nome, Turno: c.turno };

   dias.forEach(dia => {
     linha[dia] = registros[dia]?.[i] || '';
   });

   dados.push(linha);
 });

 let ws = XLSX.utils.json_to_sheet(dados);
 let wb = XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb, ws, "Histórico Mensal");
 XLSX.writeFile(wb, `historico_${mes}.xlsx`);
}

function trocarUsuario(){
 usuarioLogado = null;
 usuarioNome = '';
 app.style.display='none';
 login.style.display='block';
 user.value='';
 pass.value='';
}

login.style.display='block';
</script>

</body>
</html>
