<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Presença PRO</title>

  <style>
    body { font-family: Arial; background:#f4f4f4; margin:0; }
    h1 { text-align:center; font-size:20px; }

    .dashboard {
      display:flex; justify-content:space-around; flex-wrap:wrap;
      background:#fff; padding:10px; margin:10px; border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.2);
    }

    .box { text-align:center; padding:10px; min-width:80px; }
    .box h3 { margin:0; font-size:14px; }
    .box p { margin:5px 0 0; font-size:18px; font-weight:bold; }

    .topbar { text-align:center; margin:10px; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
      gap:10px;
      padding:10px;
    }

    .card {
      background:#fff;
      padding:8px;
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.2);
      text-align:center;
      position:relative;
    }

    .card img {
      width:100%;
      border-radius:10px;
    }

    .status {
      margin-top:5px;
      font-size:12px;
      font-weight:bold;
      position:relative;
    }

    .presente { color:green; }
    .falta { color:red; }
    .folga { color:orange; }
    .atestado { color:blue; }

    .botoes {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:5px;
      margin-top:5px;
    }

    .botoes button {
      font-size:11px;
      padding:5px;
      border:none;
      border-radius:5px;
    }

    .excluir {
      position:absolute;
      top:5px;
      right:5px;
      background:red;
      color:#fff;
      border:none;
      border-radius:50%;
      width:20px;
      height:20px;
      cursor:pointer;
      font-size:12px;
    }

    button { margin:3px; padding:6px; font-size:12px; }
    .login { text-align:center; margin-top:50px; }
    input, select { padding:6px; margin:3px; }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div id="loginScreen" class="login">
  <h2>Login</h2>
  <input type="text" id="usuario" placeholder="Usuário"><br>
  <input type="password" id="senha" placeholder="Senha"><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">
  <h1>Controle de Presença</h1>

  <div class="topbar">
    <strong>Usuário:</strong> <span id="usuarioLogado">-</span>
  </div>

  <div class="topbar">
    <button onclick="trocarUsuario()">🔄 Trocar Usuário</button>
  </div>

  <div class="dashboard">
    <div class="box"><h3>Presentes</h3><p id="presenteBox">0</p></div>
    <div class="box"><h3>Faltas</h3><p id="faltaBox">0</p></div>
    <div class="box"><h3>Folgas</h3><p id="folgaBox">0</p></div>
    <div class="box"><h3>Absentismo %</h3><p id="absBox">0%</p></div>
  </div>

  <div class="topbar">
    <input type="date" id="data" /><br>
    <button onclick="limparDia()">Limpar</button>
    <button onclick="exportarExcel()">Excel</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
  const usuarios = [
    { user: "admin", pass: "1234", turno: "all" },
    { user: "gerente", pass: "1234", turno: "1" },
    { user: "rh", pass: "1234", turno: "2" },
    { user: "supervisor", pass: "1234", turno: "3" }
  ];

  let usuarioAtual = null;

  function login(){
    const user = document.getElementById("usuario").value;
    const senha = document.getElementById("senha").value;

    const valido = usuarios.find(u => u.user === user && u.pass === senha);

    if(valido){
      usuarioAtual = valido;
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("usuarioLogado").textContent = usuarioAtual.user;
      render();
    } else {
      alert("Usuário ou senha incorretos");
    }
  }

  function trocarUsuario(){
    if(!confirm("Deseja trocar de usuário?")) return;

    usuarioAtual = null;
    document.getElementById("app").style.display = "none";
    document.getElementById("loginScreen").style.display = "block";

    document.getElementById("usuario").value = "";
    document.getElementById("senha").value = "";
    document.getElementById("usuarioLogado").textContent = "-";
  }

  const colaboradores = [
    { nome: "ANDRÉ ALVES DOS SANTOS", turno: "1" },
    { nome: "ANDRE LUIZ DA SILVA E SOUZA", turno: "1" },
    { nome: "ARIANE PEREIRA DA SILVA", turno: "1" },
    { nome: "ARTHUR JUVENAL DA LUZ", turno: "1" },
    { nome: "BRUNA PESSOA CHAVES DE MORAES", turno: "1" },
    { nome: "CAROLINA UMBELINA DE SOUZA", turno: "1" },
    { nome: "DAIARA GIOVANA JESUS DOS SANTOS", turno: "1" },
    { nome: "ELIZANGELA BARBOSA GOMES RAMOS", turno: "2" },
    { nome: "GIOVANA STEPHANI DE OLIVEIRA", turno: "2" },
    { nome: "ISABELLE FIGUEIREDO FIRMINO LUCCHETTA", turno: "2" },
    { nome: "JAQUELINE VIVIAN BORGES BARION", turno: "2" },
    { nome: "JESSICA APARECIDA DA SILVA BARBOSA", turno: "2" },
    { nome: "JESSICA DE SOUSA CASTILHO", turno: "2" },
    { nome: "JOSE ROSALINO TEODORO DE GODOI", turno: "3" },
    { nome: "MICHAEL DA SILVA REZENDE", turno: "3" },
    { nome: "MONICA JUVENCIO", turno: "3" },
    { nome: "PAULO CESAR MOREIRA", turno: "3" },
    { nome: "RAFAEL DA SILVA ABREU", turno: "3" }
  ];

  const dataInput = document.getElementById("data");
  dataInput.value = new Date().toISOString().split("T")[0];

  function render(){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    let lista = colaboradores;
    if(usuarioAtual && usuarioAtual.turno !== "all"){
      lista = colaboradores.filter(c => c.turno === usuarioAtual.turno);
    }

    lista.forEach(c => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<p>${c.nome}</p><p>Turno ${c.turno}</p>`;
      grid.appendChild(card);
    });
  }
</script>

</body>
</html>
