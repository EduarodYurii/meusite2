<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Presença PRO</title>

  <style>
    body { font-family: Arial; background:#f4f4f4; margin:0; }
    h1 { text-align:center; font-size:20px; }

    .topbar { text-align:center; margin:10px; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
      gap:10px;
      padding:10px;
    }

    .card {
      background:#fff;
      padding:8px;
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.2);
      text-align:center;
    }

    .card img {
      width:100%;
      border-radius:10px;
    }

    button { margin:3px; padding:6px; }

    @media (max-width:600px){
      .grid { grid-template-columns:repeat(2,1fr); }
    }
  </style>
</head>
<body>

<div id="loginScreen" class="topbar">
  <h2>Login</h2>
  <input type="text" id="usuario" placeholder="Usuário"><br>
  <input type="password" id="senha" placeholder="Senha"><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">
  <h1>Controle de Presença</h1>

  <div class="topbar">
    <strong>Usuário:</strong> <span id="usuarioLogado">-</span>
  </div>

  <div class="topbar">
    <button onclick="trocarUsuario()">Trocar Usuário</button>
  </div>

  <div class="topbar">
    <input type="text" id="novoNome" placeholder="Nome colaborador">
    <input type="file" id="novaFoto" accept="image/*">
    <select id="novoTurno">
      <option value="1">1º Turno</option>
      <option value="2">2º Turno</option>
      <option value="3">3º Turno</option>
    </select>
    <button onclick="adicionarColaborador()">Adicionar</button>
  </div>

  <div class="topbar">
    <h3>Ausentes do dia</h3>
    <ul id="listaAusentes"></ul>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
  const usuarios = [
    { user: "admin", pass: "1234", turno: "all" },
    { user: "gerente", pass: "1234", turno: "1" },
    { user: "rh", pass: "1234", turno: "2" },
    { user: "supervisor", pass: "1234", turno: "3" }
  ];

  let usuarioAtual = null;

  let colaboradores = [
    { nome: "ANDRÉ ALVES DOS SANTOS", turno: "1", foto:null },
    { nome: "ANDRE LUIZ DA SILVA E SOUZA", turno: "1", foto:null }
  ];

  function login(){
    const user = document.getElementById("usuario").value;
    const senha = document.getElementById("senha").value;

    const valido = usuarios.find(u => u.user === user && u.pass === senha);

    if(valido){
      usuarioAtual = valido;
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("usuarioLogado").textContent = usuarioAtual.user;
      render();
    } else {
      alert("Usuário ou senha incorretos");
    }
  }

  function trocarUsuario(){
    usuarioAtual = null;
    document.getElementById("app").style.display = "none";
    document.getElementById("loginScreen").style.display = "block";
  }

  function gerarAvatar(nome){
    const canvas = document.createElement('canvas');
    canvas.width = 120;
    canvas.height = 120;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#2c3e50';
    ctx.fillRect(0,0,120,120);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 40px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const iniciais = nome.split(' ').slice(0,2).map(n=>n[0]).join('');
    ctx.fillText(iniciais,60,60);

    return canvas.toDataURL();
  }

  function adicionarColaborador(){
    const nome = document.getElementById('novoNome').value;
    const turno = document.getElementById('novoTurno').value;
    const file = document.getElementById('novaFoto').files[0];

    if(!nome) return alert('Digite o nome');

    if(file){
      const reader = new FileReader();
      reader.onload = e => {
        colaboradores.push({nome, turno, foto:e.target.result});
        render();
      };
      reader.readAsDataURL(file);
    } else {
      colaboradores.push({nome, turno, foto:null});
      render();
    }
  }

  function atualizarAusentes(lista){
    const ul = document.getElementById("listaAusentes");
    ul.innerHTML = "";

    lista.filter(c => c.status === "Falta").forEach(c => {
      const li = document.createElement("li");
      li.textContent = c.nome;
      ul.appendChild(li);
    });

    atualizarAusentes(lista);
  }

  function render(){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    let lista = colaboradores;
    if(usuarioAtual && usuarioAtual.turno !== "all"){
      lista = colaboradores.filter(c => c.turno === usuarioAtual.turno);
    }

    lista.forEach(c => {
      if(!c.status) c.status = null;
      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement('img');
      img.src = c.foto || gerarAvatar(c.nome);

      const nome = document.createElement('p');
      nome.textContent = c.nome;

      const turno = document.createElement('p');
      turno.textContent = 'Turno ' + c.turno;

      card.appendChild(img);
      card.appendChild(nome);
      card.appendChild(turno);

      const btnPresente = document.createElement('button');
      btnPresente.textContent = 'Presente';
      btnPresente.onclick = () => { c.status = 'Presente'; render(); };

      const btnFalta = document.createElement('button');
      btnFalta.textContent = 'Falta';
      btnFalta.onclick = () => { c.status = 'Falta'; render(); };

      card.appendChild(btnPresente);
      card.appendChild(btnFalta);

      grid.appendChild(card);
    });
  }
</script>

</body>
</html>
