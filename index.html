<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Presença</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; background:#eaeef3; color:#333; }
h1,h2,h3{margin:0;padding:0;font-weight:600;}
.login-box { background:#fff; padding:40px 30px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.15); width:320px; text-align:center; margin:auto; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);}
.login-box h2{margin-bottom:25px;color:#2c3e50;}
.login-box input{width:90%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ccc; font-size:14px;}
.login-box button{width:95%; padding:12px; border:none; border-radius:8px; background:#2ecc71; color:#fff; font-size:16px; font-weight:bold; cursor:pointer; transition:0.3s;}
.login-box button:hover{background:#27ae60;}
.painel-box{display:none; padding:20px;}
.top-bar{display:flex; justify-content: space-between; align-items:center; flex-wrap: wrap; margin-bottom:20px;}
.top-bar-left{display:flex; gap:10px; flex-wrap: wrap;}
.top-bar button, .top-bar select, .top-bar input{padding:10px 14px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; transition:0.2s;}
.top-bar button:hover{background:#3498db; color:#fff;}
.top-bar select, .top-bar input{font-weight: normal;}
#usuarioNome{font-weight:bold; color:#2980b9;}
.resumo-geral{margin-bottom:15px; text-align:center; font-weight:bold; color:#2c3e50;}
.resumo-status{display:flex; justify-content:center; gap:20px; margin-bottom:20px; font-weight:bold; font-size:14px; color:#2c3e50;}
.container{display:flex; gap:20px; flex-wrap: wrap;}
.painel{flex:2; display:flex; flex-wrap: wrap; gap:20px; justify-content:center;}
.colaborador{position: relative; text-align:center; background:#fff; padding:12px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1); width:160px; transition:0.2s;}
.colaborador:hover{transform: translateY(-5px); box-shadow:0 6px 15px rgba(0,0,0,0.15);}
.colaborador img{width:100px; height:100px; border-radius:50%; border:3px solid #bdc3c7; object-fit:cover;}
.colaborador p{margin:8px 0 4px; font-weight:bold; color:#2c3e50; font-size:14px;}
.status{font-weight:bold; padding:3px 6px; border-radius:8px; color:#fff; margin-bottom:6px; display:inline-block; min-width:60px;}
.status.Presentes{background:#27ae60;}
.status.Faltas{background:#c0392b;}
.status.Folgas{background:#f39c12;}
.status.DSR{background:#2980b9;}
.status-buttons{display:flex; flex-wrap: wrap; justify-content:center; gap:4px; margin-top:6px;}
.status-buttons button{padding:4px 6px; border-radius:6px; border:none; cursor:pointer; font-size:12px; color:#fff; font-weight:bold; transition:0.2s;}
.status-buttons button:hover{opacity:0.85;}
.status-buttons button.Presentes{background:#27ae60;}
.status-buttons button.Faltas{background:#c0392b;}
.status-buttons button.Folgas{background:#f39c12;}
.status-buttons button.DSR{background:#2980b9;}
.btn-excluir{position:absolute; top:5px; right:5px; background:rgba(192,57,43,0.85); color:#fff; border:none; border-radius:50%; width:22px; height:22px; cursor:pointer; font-weight:bold; transition:0.2s;}
.btn-excluir:hover{background:rgba(192,57,43,1);}
.lista{flex:1; background:#fff; padding:20px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); height:fit-content;}
.lista h3{text-align:center;color:#2c3e50;margin-bottom:15px;}
.lista ul{list-style:none;padding:0;}
.lista li{padding:6px 0; border-bottom:1px solid #ecf0f1; font-size:14px; color:#34495e;}
#modalCadastro{display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;}
#modalCadastro div{background:#fff; padding:30px; border-radius:15px; width:300px; box-shadow:0 4px 20px rgba(0,0,0,0.2); text-align:center; position:relative;}
#modalCadastro input, #modalCadastro select{width:90%; padding:10px; margin:10px 0; border-radius:8px; border:1px solid #ccc;}
#modalCadastro button{padding:8px 15px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;}
#btnCancelarCadastro{background:#c0392b;color:#fff;}
#btnSalvarCadastro{background:#27ae60;color:#fff;}
#btnFecharModal{position:absolute; top:10px; right:15px; background:none; border:none; font-size:18px; font-weight:bold; cursor:pointer;}
@media(max-width:900px){ .container{flex-direction:column; align-items:center;} .painel{justify-content:center;} .top-bar{flex-direction:column; gap:10px;} }
</style>
</head>
<body>

<div class="login-box" id="loginBox">
  <h2>Login</h2>
  <input type="text" id="loginUsuario" placeholder="Usuário">
  <input type="password" id="loginSenha" placeholder="Senha">
  <button id="btnLogin">Entrar</button>
</div>

<div class="painel-box" id="painelBox">
  <h2>Painel de Presença</h2>
  <div id="resumoGeral" class="resumo-geral"></div>
  <div class="top-bar">
    <div class="top-bar-left">
      <button id="btnAdicionar">Adicionar Colaborador</button>
      <select id="filtroTurno"><option value="Todos">Todos os Turnos</option><option value="Manhã">Manhã</option><option value="Tarde">Tarde</option><option value="Noite">Noite</option></select>
      <input type="date" id="dataPainel">
      <button id="btnExport">Exportar Excel</button>
    </div>
    <div style="display:flex; align-items:center; gap:15px;">
      <span>Usuário: <strong id="usuarioNome"></strong></span>
      <button id="btnTrocarUsuario" style="background:#27ae60;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;">Trocar Usuário</button>
    </div>
  </div>
  <div class="resumo-status" id="resumoStatus"></div>
  <div class="container">
    <div class="painel" id="painel"></div>
    <div class="lista">
      <h3>Ausentes/Folgas</h3>
      <ul id="listaStatus"></ul>
    </div>
  </div>
</div>

<div id="modalCadastro">
  <div>
    <h3>Cadastrar Novo Colaborador</h3>
    <input type="text" id="novoNome" placeholder="Nome">
    <input type="file" id="novaFoto" accept="image/*">
    <select id="novoTurno">
      <option value="Manhã">Manhã</option>
      <option value="Tarde">Tarde</option>
      <option value="Noite">Noite</option>
    </select>
    <div style="display:flex; justify-content:space-between; margin-top:15px;">
      <button id="btnCancelarCadastro">Cancelar</button>
      <button id="btnSalvarCadastro">Salvar</button>
    </div>
    <button id="btnFecharModal">×</button>
  </div>
</div>

<script>
const usuarios = {
  "Bruna": { senha:"123", turno:"Manhã", admin:false },
  "Marciele": { senha:"123", turno:"Tarde", admin:false },
  "Pollyanna": { senha:"123", turno:"Noite", admin:false },
  "Yuri": { senha:"123", turno:"Todos", admin:true },
  "Edimir": { senha:"123", turno:"Todos", admin:true }
};

let colaboradores = [
  { nome:"Pollyanna", foto:"https://i.pravatar.cc/100?img=1", turno:"Manhã" },
  { nome:"Bruna", foto:"https://i.pravatar.cc/100?img=2", turno:"Tarde" },
  { nome:"Marciele", foto:"https://i.pravatar.cc/100?img=3", turno:"Noite" }
];

let statusSalvo = JSON.parse(localStorage.getItem("statusColaboradores")) || {};
let dataAtual = new Date().toISOString().split('T')[0];
let usuarioLogado = null;

document.getElementById("btnLogin").addEventListener("click", ()=>{
  const u=document.getElementById("loginUsuario").value.trim();
  const s=document.getElementById("loginSenha").value;
  if(usuarios[u] && usuarios[u].senha===s){
    usuarioLogado=u;
    document.getElementById("loginBox").style.display="none";
    document.getElementById("painelBox").style.display="block";
    document.getElementById("usuarioNome").innerText=u;
    document.getElementById("btnAdicionar").style.display = usuarios[u].admin?"inline-block":"none";
    document.getElementById("dataPainel").value=dataAtual;
    if(usuarios[u].admin) atualizarResumoGeral(); else document.getElementById("resumoGeral").style.display="none";
    atualizarPainel();
  }else alert("Usuário ou senha incorretos!");
});

document.getElementById("btnTrocarUsuario").addEventListener("click", ()=>{
  if(confirm("Deseja sair e trocar de usuário?")){
    usuarioLogado = null;
    document.getElementById("loginBox").style.display="block";
    document.getElementById("painelBox").style.display="none";
    document.getElementById("loginUsuario").value="";
    document.getElementById("loginSenha").value="";
  }
});

function salvarStatus(){ localStorage.setItem("statusColaboradores", JSON.stringify(statusSalvo)); }
function getStatusAtual(){ if(!statusSalvo[dataAtual]) statusSalvo[dataAtual]={}; return statusSalvo[dataAtual]; }

function atualizarResumoGeral() {
  if(!usuarioLogado) return;
  const user = usuarios[usuarioLogado];
  const div = document.getElementById("resumoGeral");
  if(!user.admin){ div.style.display="none"; return; }

  const statusAtual = getStatusAtual();
  const turnos = ["Manhã","Tarde","Noite"];
  let html = "<h3>Resumo Geral por Turno</h3>";

  turnos.forEach(turno=>{
    const cols = colaboradores.filter(c=>c.turno===turno);
    const total = cols.length;
    const cont={Presentes:0,Faltas:0,Folgas:0,DSR:0};
    cols.forEach(c=>{
      const st = statusAtual[c.nome];
      if(st) cont[st]++;
    });
    const pctFaltasDSR = Math.round(((cont.Faltas+cont.DSR)/total)*100);
    html += `<div style="margin-bottom:5px;"><strong>${turno}</strong>: Presentes ${cont.Presentes} | Faltas ${cont.Faltas} | Folgas ${cont.Folgas} | DSR ${cont.DSR} | Ausência ${pctFaltasDSR}%</div>`;
    if(pctFaltasDSR>20) html += `<div style="color:red;">⚠️ Atenção! Ausências >20% no turno ${turno}</div>`;
  });

  div.innerHTML = html;
  div.style.display = "block";
}

function atualizarResumo(){
  const resumo=document.getElementById("resumoStatus");
  const statusAtual=getStatusAtual();
  const total = colaboradores.length;
  const cont={Presentes:0,Faltas:0,Folgas:0,DSR:0};
  colaboradores.forEach(col=>{ const st=statusAtual[col.nome]; if(st) cont[st]++; });
  const pct = {
    Presentes: Math.round((cont.Presentes/total)*100),
    Faltas: Math.round((cont.Faltas/total)*100),
    Folgas: Math.round((cont.Folgas/total)*100),
    DSR: Math.round((cont.DSR/total)*100)
  };
  resumo.innerText=`Presentes: ${cont.Presentes} (${pct.Presentes}%) | Faltas: ${cont.Faltas} (${pct.Faltas}%) | Folgas: ${cont.Folgas} (${pct.Folgas}%) | DSR: ${cont.DSR} (${pct.DSR}%)`;

  const ausenciaPct = pct.Faltas + pct.DSR;
  if(ausenciaPct > 20){ alert(`⚠️ Atenção! Ausências e DSR acima de 20% (${ausenciaPct}%)`); }
}

function atualizarLista(){
  const listaStatus=document.getElementById("listaStatus"); listaStatus.innerHTML="";
  const statusAtual=getStatusAtual();
  colaboradores.forEach(col=>{
    const st=statusAtual[col.nome];
    if(st && ["Faltas","DSR","Folgas"].includes(st)){
      const li=document.createElement("li");
      li.innerText=`${col.nome} - ${st} (${col.turno})`;
      listaStatus.appendChild(li);
    }
  });
}

function atualizarPainel(){
  const painel=document.getElementById("painel"); painel.innerHTML="";
  const statusAtual=getStatusAtual();
  const turnoFiltro=document.getElementById("filtroTurno").value;
  const user=usuarios[usuarioLogado];

  colaboradores.forEach((col,index)=>{
    if(user.turno!=="Todos" && col.turno!==user.turno) return;
    if(turnoFiltro!=="Todos" && col.turno!==turnoFiltro) return;

    const div=document.createElement("div"); div.className="colaborador";
    const img=document.createElement("img"); img.src=col.foto;
    const nome=document.createElement("p"); nome.innerText=`${col.nome} - ${col.turno}`;
    const status=document.createElement("div"); const st=statusAtual[col.nome]||""; status.innerText=st; status.className=st?"status "+st:"status";

    const btnExcluir=document.createElement("button"); btnExcluir.innerText="×"; btnExcluir.className="btn-excluir";
    if(user.admin){ btnExcluir.addEventListener("click",(e)=>{ e.stopPropagation(); if(confirm(`Deseja excluir ${col.nome}?`)){ colaboradores.splice(index,1); delete statusAtual[col.nome]; salvarStatus(); atualizarPainel(); } }); }
    else btnExcluir.style.display="none";

    const btns=document.createElement("div"); btns.className="status-buttons";
    ["Presentes","Faltas","Folgas","DSR"].forEach(s=>{
      const b=document.createElement("button"); b.innerText=s; b.className=s;
      if(user.admin || user.turno===col.turno){ b.addEventListener("click",(e)=>{ e.stopPropagation(); status.innerText=s; status.className="status "+s; statusAtual[col.nome]=s; salvarStatus(); atualizarLista(); atualizarResumo(); if(user.admin) atualizarResumoGeral(); }); }
      else b.disabled=true;
      btns.appendChild(b);
    });

    div.appendChild(img); div.appendChild(nome); div.appendChild(status); div.appendChild(btns); div.appendChild(btnExcluir);
    painel.appendChild(div);
  });
  atualizarLista();
  atualizarResumo();
  if(usuarios[usuarioLogado].admin) atualizarResumoGeral();
}

document.getElementById("filtroTurno").addEventListener("change",atualizarPainel);
document.getElementById("dataPainel").addEventListener("change",()=>{ dataAtual=document.getElementById("dataPainel").value; atualizarPainel(); });

const modal=document.getElementById("modalCadastro");
document.getElementById("btnAdicionar").addEventListener("click",()=>{ modal.style.display="flex"; });
document.getElementById("btnCancelarCadastro").addEventListener("click",()=>{ modal.style.display="none"; });
document.getElementById("btnFecharModal").addEventListener("click",()=>{ modal.style.display="none"; });
document.getElementById("btnSalvarCadastro").addEventListener("click", ()=>{
  const nome=document.getElementById("novoNome").value.trim();
  const turno=document.getElementById("novoTurno").value;
  const fileInput=document.getElementById("novaFoto");
  if(!nome){ alert("Digite um nome válido!"); return; }

  let reader = new FileReader();
  reader.onload=function(e){
    colaboradores.push({nome:nome,foto:e.target.result,turno:turno});
    modal.style.display="none";
    document.getElementById("novoNome").value=""; fileInput.value="";
    atualizarPainel();
  }
  if(fileInput.files[0]) reader.readAsDataURL(fileInput.files[0]);
  else { colaboradores.push({nome:nome,foto:"https://i.pravatar.cc/100",turno:turno}); modal.style.display="none"; atualizarPainel(); }
});

document.getElementById("btnExport").addEventListener("click", ()=>{
  const ws_data=[["Nome","Turno","Status"]];
  const statusAtual=getStatusAtual();
  colaboradores.forEach(c=>{ ws_data.push([c.nome,c.turno,statusAtual[c.nome]||""]); });
  const ws=XLSX.utils.aoa_to_sheet(ws_data);
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Presença");
  XLSX.writeFile(wb,"Presenca.xlsx");
});
</script>

</body>
</html>
